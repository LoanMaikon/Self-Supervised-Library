mode: simsiam

data:
  datasets_path: /home/lmk22/datasets
  train_dataset: imagenet
  batch_size: 256 # 2 gpu
  crop_size: 224
  num_workers: 32 # 2 gpu
  prefetch_factor: 1
  pin_memory: false
  drop_last: true
  crop_scale:
    - 0.2
    - 1.0
  crop_ratio:
    - 0.75
    - 1.3333333333333333
  color_jitter: true
  gaussian_blur: true
  horizontal_flip: true
  normalize:
    mean:
      - 0.485
      - 0.456
      - 0.406
    std:
      - 0.229
      - 0.224
      - 0.225
  separate_val_subset:
    use: false
    size: 0.1

meta:
  model_name: resnet50
  checkpoint: false
  pretrained_weights: null # Path to the pretrained weights file. Set to null if you don't want to load pretrained weights.
  save_every: 0 # Set to 0 if you don't want to save intermediate checkpoints during training
  out_dim: 2048
  pred_dim: 512

optimization:
  ipe_scale: 1.0
  lr:
    - 0.1
    - 0.1
    - 0.0
  weight_decay:
    - 0.0001
    - 0.0001
  num_epochs: 100
  warmup_epochs: 0
  optimizer: sgd
  criterion: cosine_similarity
