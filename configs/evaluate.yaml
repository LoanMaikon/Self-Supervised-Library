mode: evaluate

data:
  datasets_path: /disk2/lmk22/datasets
  train_dataset: imagenet
  batch_size: 16 # For each device, so the effective batch size is batch_size * num_devices
  crop_size: 224
  num_workers: 8 # For each device, so the effective number of workers is num_workers * num_devices
  prefetch_factor: 2
  pin_memory: false
  drop_last: true
  normalize:
    mean:
      - 0.485
      - 0.456
      - 0.406
    std:
      - 0.229
      - 0.224
      - 0.225
  separate_val_subset:
    use: false
    size: 0.1
  
meta:
  checkpoint: false
  mode: linear_eval
  pretrained_weights: null

optimization:
  ipe_scale: 1.0
  lr:
  - 0.01
  - 0.01
  - 0.01
  weight_decay:
  - 0.04
  - 0.4
  epochs: 3
  warmup_epochs: 1
  optimizer: sgd
  criterion: cross_entropy
