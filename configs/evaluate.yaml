mode: evaluate

data:
  datasets_path: /disk2/lmk22/datasets
  train_dataset: imagenet
  batch_size: 256 # For each device, so the effective batch size is batch_size * num_devices
  crop_size: 224
  num_workers: 8 # For each device, so the effective number of workers is num_workers * num_devices
  prefetch_factor: 2
  pin_memory: false
  drop_last: true
  normalize:
    mean:
      - 0.485
      - 0.456
      - 0.406
    std:
      - 0.229
      - 0.224
      - 0.225
  horizontal_flip:
    use: true
    p: 0.5
  random_resized_crop:
    use: true
    p: 1.0
    scale:
    - 0.08
    - 1.0
    ratio:
    - 3.0/4.0
    - 4.0/3.0
  separate_val_subset:
    use: true
    size: 0.1
  
meta:
  checkpoint: false
  mode: linear_eval
  pretrained_weights: null # Path to the pretrained weights file. Set to null if you don't want to load pretrained weights.
  save_every: 1 # Set to 0 if you don't want to save intermediate checkpoints during training

optimization:
  ipe_scale: 1.0
  lr:
  - 0.0001
  - 0.01
  - 0.001
  weight_decay:
  - 0.04
  - 0.4
  epochs: 6
  warmup_epochs: 2
  optimizer: sgd
  criterion: cross_entropy
