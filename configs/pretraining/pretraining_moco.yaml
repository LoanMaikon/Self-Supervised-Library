mode: simclr

data:
  datasets_path: /home/lmk22/datasets
  train_dataset: imagenet
  batch_size: 256 # For each device, so the effective batch size is batch_size * num_devices
  crop_size: 224
  num_workers: 64 # For each device, so the effective number of workers is num_workers * num_devices
  prefetch_factor: 1
  pin_memory: false
  drop_last: true
  crop_scale:
    - 0.2
    - 1.0
  crop_ratio:
    - 0.75
    - 1.3333333333333333
  color_jitter: true
  gaussian_blur: true
  horizontal_flip: true
  normalize:
    mean:
      - 0.485
      - 0.456
      - 0.406
    std:
      - 0.229
      - 0.224
      - 0.225
  separate_val_subset:
    use: false
    size: 0.1

meta:
  model_name: resnet50
  checkpoint: false
  projection_dim: 256
  pretrained_weights: null # Path to the pretrained weights file. Set to null if you don't want to load pretrained weights.
  save_every: 0 # Set to 0 if you don't want to save intermediate checkpoints during training
  queue_size: 65536

optimization:
  ipe_scale: 1.0
  ema: 0.999
  lr:
    - 0.03
    - 0.03
    - 0.0003
  weight_decay:
    - 0.0001
    - 0.0001
  num_epochs: 100
  warmup_epochs: 10
  optimizer: sgd
  temperature: 0.07
  criterion: nt_xent
