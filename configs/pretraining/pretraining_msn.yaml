mode: msn

data:
  datasets_path: /home/lmk22/datasets
  train_dataset: imagenet
  batch_size: 512 # For each device, so the effective batch size is batch_size * num_devices
  num_workers: 64 # For each device, so the effective number of workers is num_workers * num_devices
  prefetch_factor: 1
  pin_memory: false
  drop_last: true
  normalize:
    mean:
      - 0.485
      - 0.456
      - 0.406
    std:
      - 0.229
      - 0.224
      - 0.225
  global_views:
    num: 2
    crop_scale:
      - 0.14
      - 1.0
    crop_ratio:
      - 0.75
      - 1.3333333333333333
    color_jitter: true
    gaussian_blur: true
    horizontal_flip: true
    crop_size: 224
    mask_ratio: 0.15
  local_views:
    num: 4
    crop_scale:
      - 0.05
      - 0.14
    crop_ratio:
      - 0.75
      - 1.3333333333333333
    color_jitter: true
    gaussian_blur: true
    horizontal_flip: true
    crop_size: 96
  separate_val_subset:
    use: false
    size: 0.1

meta:
  model_name: vit_small
  checkpoint: false
  pretrained_weights: null # Path to the pretrained weights file. Set to null if you don't want to load pretrained weights.
  save_every: 0 # Set to 0 if you don't want to save intermediate checkpoints during training
  patch_size: 16
  projection_head:
    hidden_dim: 2048
    output_dim: 256

optimization:
  ipe_scale: 1.0
  lr:
    - 0.0002
    - 0.001
    - 0.000001
  weight_decay:
    - 0.04
    - 0.4
  ema:
    - 0.996
    - 1.0
  temperature_anchor:
  - 0.1
  - 0.1
  - 0.1
  temperature_target:
  - 0.0025
  - 0.0025
  - 0.0025
  tempereature_warmup: 0
  num_epochs: 100
  warmup_epochs: 15
  optimizer: adamw
  memax_regularization_weight: 1.0
  num_prototypes: 1024
  freeze_prototypes_epochs: 1
  use_sinkhorn: true
  drop_path_rate: 0.15
  use_entropy: True
  entropy_regularization_weight: 0.0
