mode: ijepa

data:
  datasets_path: /disk2/lmk22/datasets
  train_dataset: imagenet
  batch_size: 16 # For each device, so the effective batch size is batch_size * num_devices
  crop_size: 224
  num_workers: 2 # For each device, so the effective number of workers is num_workers * num_devices
  prefetch_factor: 2
  pin_memory: false
  drop_last: true
  normalize:
    mean:
      - 0.485
      - 0.456
      - 0.406
    std:
      - 0.229
      - 0.224
      - 0.225
  separate_val_subset:
    use: false
    size: 0.1
  
mask:
  target_aspect_ratio:
  - 0.75
  - 1.5
  context_mask_scale:
  - 0.85
  - 1.0
  min_context_patches: 10
  num_target_masks: 4
  patch_size: 14
  target_mask_scale:
  - 0.15
  - 0.2

meta:
  model_name: vit_tiny
  checkpoint: false
  predictor_depth: 6
  predictor_emb_dim: 384
  predictor_num_heads: 3

optimization:
  ipe_scale: 1.0
  ema:
  - 0.996
  - 1.0
  lr:
  - 0.0001
  - 0.001
  - 0.000001
  weight_decay:
  - 0.04
  - 0.4
  epochs: 300
  warmup_epochs: 15
  optimizer: adamw
  criterion: mse_loss
