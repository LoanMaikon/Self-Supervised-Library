mode: dinov1

data:
  datasets_path: /home/lmk22/datasets
  train_dataset: imagenet
  batch_size: 256 # For each device, so the effective batch size is batch_size * num_devices
  num_workers: 64 # For each device, so the effective number of workers is num_workers * num_devices
  prefetch_factor: 1
  pin_memory: false
  drop_last: true
  normalize:
    mean:
      - 0.485
      - 0.456
      - 0.406
    std:
      - 0.229
      - 0.224
      - 0.225
  separate_val_subset:
    use: false
    size: 0.1
  global_views:
    num: 2
    crop_scale:
      - 0.3
      - 1.0
    crop_ratio:
      - 0.75
      - 1.3333333333333333
    crop_size: 224
  local_views:
    num: 0
    crop_scale:
      - 0.05
      - 0.3
    crop_ratio:
      - 0.75
      - 1.3333333333333333
    crop_size: 96

meta:
  model_name: vit_small
  checkpoint: false
  pretrained_weights: null # Path to the pretrained weights file. Set to null if you don't want to load pretrained weights.
  save_every: 0 # Set to 0 if you don't want to save intermediate checkpoints during training
  patch_size: 16
  projection_head:
    hidden_dim: 2048
    bottleneck_dim: 256
    output_dim: 65536
    use_bn: false
    norm_last_layer: true
    n_layers: 3

optimization:
  ipe_scale: 1.0
  ema:
  - 0.996
  - 1.0
  lr:
  - 0.00005
  - 0.0005 # 0.0005 ∗ batchsize/256
  - 0.000001
  weight_decay:
  - 0.04
  - 0.4
  epochs: 100
  warmup_epochs: 0
  optimizer: adamw
  sinkhorn_epsilon: 0.05
  sinkhorn_iterations: 3
  temperature_student:
  - 0.1
  - 0.1
  - 0.1
  temperature_teacher:
  - 0.04
  - 0.07
  - 0.07
  tempereature_warmup: 30
  center_momentum: 0.9

