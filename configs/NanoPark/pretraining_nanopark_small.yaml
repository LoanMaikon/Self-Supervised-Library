mode: simclr

data:
  datasets_path: /home/lmk22/datasets
  train_dataset: imagenet
  batch_size: 2048 # For each device, so the effective batch size is batch_size * num_devices
  crop_size: 224
  num_workers: 64 # For each device, so the effective number of workers is num_workers * num_devices
  prefetch_factor: 1
  pin_memory: false
  drop_last: true
  crop_scale:
    - 0.08
    - 1.0
  crop_ratio:
    - 0.75
    - 1.3333333333333333
  color_jitter: true
  gaussian_blur: true
  horizontal_flip: true
  normalize:
    mean:
      - 0.485
      - 0.456
      - 0.406
    std:
      - 0.229
      - 0.224
      - 0.225
  separate_val_subset:
    use: false
    size: 0.1

meta:
  model_name: nanopark_small
  checkpoint: false
  projection_dim: 128
  pretrained_weights: null # Path to the pretrained weights file. Set to null if you don't want to load pretrained weights.
  save_every: 0 # Set to 0 if you don't want to save intermediate checkpoints during training

optimization:
  ipe_scale: 1.0
  lr:
    - 0.001
    - 2.4
    - 0.0
  weight_decay:
    - 1e-6
    - 1e-6
  num_epochs: 1000
  warmup_epochs: 10
  optimizer: lars
  temperature: 0.1
  criterion: nt_xent
