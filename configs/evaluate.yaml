mode: evaluate

data:
  datasets_path: /home/lmk22/datasets
  train_dataset: imagenet
  batch_size: 512 # For each device, so the effective batch size is batch_size * num_devices
  crop_size: 224
  num_workers: 32 # For each device, so the effective number of workers is num_workers * num_devices
  prefetch_factor: 1
  pin_memory: false
  drop_last: true
  normalize:
    mean:
      - 0.485
      - 0.456
      - 0.406
    std:
      - 0.229
      - 0.224
      - 0.225
  horizontal_flip:
    use: true
    p: 0.5
  random_resized_crop:
    use: true
    p: 1.0
    scale:
    - 0.08
    - 1.0
    ratio:
    - 0.75
    - 1.3333333333333333
  separate_val_subset:
    use: false
    size: 0.1
  
meta:
  checkpoint: false
  mode: linear_eval
  pretrained_weights: null # Path to the pretrained weights file. Set to null if you don't want to load pretrained weights.
  save_every: 0 # Set to 0 if you don't want to save intermediate checkpoints during training

optimization:
  ipe_scale: 1.0
  lr:
  - 0.2
  - 0.2
  - 0.2
  weight_decay:
  - 0
  - 0
  epochs: 90
  warmup_epochs: 0
  optimizer: sgd
  criterion: cross_entropy
